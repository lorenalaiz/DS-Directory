name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ui-tests:
    name: UI Tests (Firebase Emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Install test dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase emulators
        run: firebase emulators:start --project demo-ds-directory-test > firebase-emulator-ci.log 2>&1 &

      - name: Wait for emulators to be ready
        run: npx wait-on tcp:8080 tcp:9099 tcp:9199 --timeout 180000

      - name: Create test admin user in emulator
        run: |
          curl -f -s -X POST "http://localhost:9099/identitytoolkit.googleapis.com/v1/accounts:signUp?key=fake-api-key" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${{ secrets.ADMIN_EMAIL }}\",\"password\":\"${{ secrets.ADMIN_PASSWORD }}\",\"returnSecureToken\":true}"

      - name: Show emulator log on failure
        if: failure()
        run: cat firebase-emulator-ci.log

      - name: Serve app
        run: npx serve . -l 3000 &

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run UI tests
        run: npm run test:ui
        env:
          BASE_URL: http://localhost:3000
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-testing/playwright-report/
          retention-days: 7
          if-no-files-found: ignore